<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e14; color: #fff; margin: 0; padding: 10px; }
        .edu-btn { width: 100%; padding: 12px; margin-bottom: 5px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <!-- Pastikan Anda punya 3 Tab seperti sebelumnya, saya fokuskan di script pengirimannya -->
    <script>
        Telegram.WebApp.ready();

        function sendToBot(action, payload) {
            // Memberi feedback getaran agar user tahu tombol terpencet
            Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            
            let data = { action: action, ...payload };
            
            // Mengirim data dan memastikan bot menerima
            Telegram.WebApp.sendData(JSON.stringify(data));
        }

        function askNews() {
            let t = document.getElementById("newsTopic").value;
            if(!t) { alert("Isi topik beritanya!"); return; }
            sendToBot('NEWS_ANALYSIS', { topic: t });
        }

        function reqEdu(materi) {
            sendToBot('EDUKASI', { materi: materi });
        }
    </script>
    <!-- Sisipkan tombol-tombol edukasi Anda di sini -->
    <button class="edu-btn" style="background:#d32f2f;" onclick="reqEdu('NFP (Non-Farm Payroll)')">NFP (Tenaga Kerja)</button>
    <button class="edu-btn" style="background:#d32f2f;" onclick="reqEdu('CPI (Data Inflasi)')">CPI (Data Inflasi)</button>
</body>
</html>
