<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Trading Pro - Ultimate Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #07090D; --bg-card: #11151C; --bg-surface: #1A212D;
            --primary: #2962FF; --accent: #00E676; --danger: #FF1744;
            --warning: #FFAB00; --text-main: #F0F4F8; --text-muted: #8A94A6;
            --border: rgba(255, 255, 255, 0.08); --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); padding-bottom: 80px; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .view-page { display: none; padding: 15px; }
        .view-page.active { display: block; }
        
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
        .btn { padding: 0.8rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        
        /* Roast Box Styling */
        #roast-box { padding: 15px; background: rgba(255,171,0,0.1); border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--warning); display:none; }
        
        /* Quiz Styling */
        .option-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; color: white; text-align: left; }
        .option-btn:active { background: var(--primary); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #07090D; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: var(--text-muted); text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h4 id="user-name">Pro Trader</h4>
            <div style="font-size: 11px; color: var(--text-muted);" id="user-rank">Rank: Rookie</div>
        </div>
        <div id="rank-badge" class="badge" style="background: var(--primary); padding: 5px 10px; border-radius: 5px; font-size: 10px;">PRO</div>
    </header>

    <main id="view-dashboard" class="view-page active">
        <div id="roast-box">
            <p id="roast-text" style="font-size: 13px; color: var(--warning);"></p>
        </div>
        <div class="card">
            <h4>Selamat Datang Kembali</h4>
            <p style="font-size: 13px;">Gunakan modul quiz untuk meningkatkan pangkat anda.</p>
        </div>
    </main>

    <main id="view-quiz" class="view-page">
        <h3><i class="fa-solid fa-brain text-primary"></i> Certification Pro Quiz</h3>
        <div class="card" id="quiz-area">
            <div id="quiz-content">
                <h4 id="question-text" style="margin-bottom: 15px;">Memuat...</h4>
                <div id="options-container"></div>
            </div>
            <div id="result-area" style="display:none; text-align:center;">
                <h2 id="final-score">0/10</h2>
                <p id="rank-update" style="margin: 10px 0;"></p>
                <button class="btn btn-primary" onclick="Quiz.init()">Ulangi Kuis</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="App.nav('view-dashboard', this)"><i class="fa-solid fa-house"></i><br>Home</div>
        <div class="nav-item" onclick="App.nav('view-quiz', this)"><i class="fa-solid fa-brain"></i><br>Quiz</div>
    </nav>

    <script>
        const App = {
            init() {
                this.loadUserData();
                this.showRoast();
            },
            nav(viewId, el) {
                document.querySelectorAll('.view-page').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                el.classList.add('active');
            },
            loadUserData() {
                const rank = localStorage.getItem('userRank') || 'Rookie';
                document.getElementById('user-rank').innerText = `Rank: ${rank}`;
            },
            showRoast() {
                const box = document.getElementById('roast-box');
                const text = document.getElementById('roast-text');
                const roasts = [
                    "Oh, Anda login lagi? Saya harap kali ini Anda tidak membakar akun Anda seperti kemarin.",
                    "Kembali mencari keajaiban pasar? Spoiler: Pasar tidak peduli dengan perasaan Anda.",
                    "Lihat siapa yang datang. Masih pakai akun demo atau sudah berani pakai uang asli?",
                    "Jangan buka posisi dulu, tarik napas. Kerugian kemarin sudah cukup buat pelajaran, kan?",
                    "Pangkat masih rendah tapi gaya sudah seperti Hedge Fund Manager. Fokus!"
                ];
                text.innerText = roasts[Math.floor(Math.random() * roasts.length)];
                box.style.display = 'block';
            }
        };

        const Quiz = {
            data: [
                {q: "Apa fungsi CHoCH dalam SMC?", a: ["Perubahan tren karakter", "Pemicu beli"], correct: 0},
                {q: "Apa dampak Hawkish The Fed?", a: ["Dolar Menguat", "Dolar Melemah"], correct: 0},
                {q: "Apa itu FVG?", a: ["Fair Value Gap", "Fast Volatility Gain"], correct: 0},
                {q: "Kapan waktu terbaik eksekusi?", a: ["Overlap Sesi", "Saat tidur"], correct: 0},
                {q: "Apa itu Liquidity Sweep?", a: ["Jebakan Ritel", "Strategi Bank"], correct: 0},
                {q: "Apa arti 1 Pip di EURUSD?", a: ["0.0001", "0.01"], correct: 0},
                {q: "Apa korelasi Emas vs Dolar?", a: ["Berkebalikan", "Sama"], correct: 0},
                {q: "Apa itu Order Block?", a: ["Jejak Institusi", "Pola candle"], correct: 0},
                {q: "Bagaimana cara hitung lot ideal?", a: ["Risiko / SL", "Tebak"], correct: 0},
                {q: "Apa itu FOMO?", a: ["Takut tertinggal", "Trading santai"], correct: 0}
            ],
            index: 0, score: 0,
            init() {
                this.index = 0; this.score = 0;
                document.getElementById('quiz-content').style.display = 'block';
                document.getElementById('result-area').style.display = 'none';
                this.render();
            },
            render() {
                const q = this.data[this.index];
                document.getElementById('question-text').innerText = `${this.index + 1}. ${q.q}`;
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                q.a.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => this.check(i);
                    container.appendChild(btn);
                });
            },
            check(idx) {
                if(idx === this.data[this.index].correct) this.score++;
                this.index++;
                if(this.index < this.data.length) this.render();
                else this.finish();
            },
            finish() {
                document.getElementById('quiz-content').style.display = 'none';
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('final-score').innerText = `Skor: ${this.score}/10`;
                
                let rank = "Rookie";
                if(this.score >= 9) rank = "Market Maker";
                else if(this.score >= 7) rank = "Elite Institutional";
                else if(this.score >= 5) rank = "Advanced Trader";
                
                document.getElementById('rank-update').innerText = `Selamat, Pangkat Anda naik menjadi: ${rank}`;
                localStorage.setItem('userRank', rank);
                App.loadUserData();
            }
        };

        window.addEventListener('DOMContentLoaded', () => { App.init(); Quiz.init(); });
    </script>
</body>
</html>
