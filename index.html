<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0e1621; color: white; padding: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #242f3d; border: none; color: white; border-radius: 5px; }
        .tab-btn.active { background: #2481cc; }
        .content { display: none; } .content.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #17212b; color: white; }
        button.action { width: 100%; padding: 15px; background: #2481cc; border: none; color: white; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('trade')">🚀 Trade</button>
        <button class="tab-btn" onclick="showTab('news')">📰 News AI</button>
    </div>

    <!-- TAB TRADE -->
    <div id="trade" class="content active">
        <select id="pair">
            <option value="XAUUSD">XAUUSD</option>
            <option value="BTCUSD">BTCUSD</option>
            <option value="DXY">DXY</option>
        </select>
        <input type="number" id="lot" placeholder="Lot (Contoh: 0.01)">
        <input type="number" id="capital" placeholder="Modal (Contoh: 1000)">
        <button class="action" onclick="sendAction('TRADE')">EKSEKUSI TRADE</button>
    </div>

    <!-- TAB NEWS -->
    <div id="news" class="content">
        <input type="date" id="newsDate">
        <input type="text" id="newsTopic" placeholder="Topik berita / Analisis tanggal ini">
        <button class="action" onclick="sendAction('NEWS')">ANALISIS NEWS</button>
    </div>

    <script>
        Telegram.WebApp.ready();
        function showTab(t) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function sendAction(type) {
            let data = { type: type };
            if(type === 'TRADE') {
                data.pair = document.getElementById('pair').value;
                data.lot = document.getElementById('lot').value;
                data.capital = document.getElementById('capital').value;
            } else {
                data.date = document.getElementById('newsDate').value;
                data.topic = document.getElementById('newsTopic').value;
            }
            Telegram.WebApp.sendData(JSON.stringify(data));
            Telegram.WebApp.close();
        }
    </script>
</body>
</html>
