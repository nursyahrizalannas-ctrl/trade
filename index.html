<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0b0e14; color: white; margin: 0; padding: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #1f2630; border: none; color: white; border-radius: 5px; }
        .tab-btn.active { background: #2962ff; }
        .content { display: none; } .content.active { display: block; }
        .card { background: #17212b; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #242f3d; color: white; border: none; border-radius: 5px; box-sizing: border-box; }
        button.trade-btn { width: 48%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .buy { background: #089981; } .sell { background: #f23645; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('trade')">🚀 Trade</button>
        <button class="tab-btn" onclick="showTab('chart')">📈 Chart</button>
        <button class="tab-btn" onclick="showTab('news')">📰 News</button>
    </div>

    <div id="trade" class="content active">
        <div class="card">
            <select id="pair"><option value="XAUUSD">XAUUSD</option><option value="BTCUSD">BTCUSD</option></select>
            <input type="number" id="lot" placeholder="Lot Size (e.g., 0.01)" step="0.01">
            <div style="display:flex; gap:10px;">
                <button class="trade-btn buy" onclick="exec('BUY')">BUY</button>
                <button class="trade-btn sell" onclick="exec('SELL')">SELL</button>
            </div>
        </div>
    </div>

    <div id="chart" class="content">
        <div id="tv-chart" style="height:350px;"></div>
    </div>

    <div id="news" class="content">
        <iframe src="https://sslecal2.forexprostools.com/?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&importance=1,2,3&lang=1" width="100%" height="450" frameborder="0"></iframe>
    </div>

    <script>
        Telegram.WebApp.ready();
        function showTab(t) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t=='chart') new TradingView.widget({"container_id":"tv-chart", "symbol":document.getElementById("pair").value, "theme":"dark", "autosize":true, "interval":"15"});
        }
        function exec(t) {
            let data = { action: 'TRADE', type: t, pair: document.getElementById("pair").value, lot: document.getElementById("lot").value };
            Telegram.WebApp.sendData(JSON.stringify(data));
            Telegram.WebApp.close();
        }
    </script>
</body>
</html>
