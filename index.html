<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e14; color: #fff; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; background: #1f2630; border: none; color: #888; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: #2962ff; color: #fff; }
        .content { display: none; } .content.active { display: block; }
        
        /* Panel Live PnL */
        .live-panel { background: #17212b; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 10px; border: 1px solid #363c4e; }
        .live-price { font-size: 24px; font-weight: bold; color: #e0e0e0; margin: 5px 0; }
        .pnl-box { font-size: 20px; font-weight: bold; padding: 10px; border-radius: 5px; background: #0b0e14; margin-top: 5px; }
        .pnl-green { color: #089981; } .pnl-red { color: #f23645; }

        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #242f3d; color: white; border: 1px solid #363c4e; border-radius: 5px; box-sizing: border-box; }
        button.action-btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .buy { background: #089981; } .sell { background: #f23645; }
        .trade-row { display: flex; gap: 5px; margin-top: 5px; }
        .trade-row button, .trade-row input { flex: 1; margin: 0; }
        
        h4 { margin: 0 0 10px 0; color: #2962ff; border-bottom: 1px solid #363c4e; padding-bottom: 5px; }
        
        /* Grid Edukasi */
        .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .edu-btn { padding: 10px; font-size: 11px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .bg-red { background: #d32f2f; } .bg-orange { background: #f57c00; } .bg-green { background: #388e3c; } .bg-blue { background: #1976d2; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('main', this)">📈 Trade</button>
        <button class="tab-btn" onclick="showTab('news', this)">📅 Kalender</button>
        <button class="tab-btn" onclick="showTab('edu', this)">📚 Edukasi AI</button>
    </div>

    <!-- TAB 1: TRADE & REALTIME PNL -->
    <div id="main" class="content active">
        <div class="live-panel">
            <div style="font-size: 12px; color: #aaa;" id="status-text">Menunggu Market...</div>
            <div class="live-price" id="live-price">Memuat Data...</div>
            <div class="pnl-box" id="pnl-display">Floating: $0.00</div>
        </div>
        
        <div id="tv-chart" style="height:250px; margin-bottom:10px;"></div>
        
        <select id="pair" onchange="changePair()">
            <option value="PAXGUSDT">XAUUSD (Gold Proxy)</option>
            <option value="BTCUSDT">BTCUSDT (Bitcoin)</option>
            <option value="EURUSDT">EURUSD (Euro Proxy)</option>
        </select>
        
        <div class="trade-row">
            <input type="number" id="lot" placeholder="Lot (Cth: 0.1)" step="0.01" value="0.1">
        </div>
        <div class="trade-row">
            <button class="action-btn buy" onclick="execTrade('BUY')">BUY</button>
            <button class="action-btn sell" onclick="execTrade('SELL')">SELL</button>
        </div>
        <button class="action-btn" onclick="execClose()" style="background:#ffa000; color:black;">🔴 TUTUP POSISI (AMBIL PROFIT/LOSS)</button>
    </div>

    <!-- TAB 2: KALENDER NEWS TRADINGVIEW -->
    <div id="news" class="content">
        <div style="background: #17212b; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <h4>🤖 Minta AI Analisis Berita</h4>
            <input type="text" id="newsTopic" placeholder="Ketik kejadian (Cth: Inflasi US hari ini)">
            <button class="action-btn buy" onclick="askNews()">KIRIM KE BOT AI</button>
        </div>

        <div style="height: 400px; background: #131722; border-radius: 5px; overflow: hidden;">
            <!-- TradingView Economic Calendar Widget -->
            <div class="tradingview-widget-container">
              <div class="tradingview-widget-container__widget"></div>
              <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
              {
              "colorTheme": "dark",
              "isTransparent": true,
              "width": "100%",
              "height": "400",
              "locale": "id",
              "importanceFilter": "-1,0,1",
              "currencyFilter": "USD,EUR,GBP,JPY,AUD,CAD,CHF,NZD"
              }
              </script>
            </div>
        </div>
    </div>

    <!-- TAB 3: EDUKASI LENGKAP -->
    <div id="edu" class="content">
        <div style="background: #17212b; padding: 15px; border-radius: 8px;">
            <p style="font-size:12px; color:#aaa; margin-top:0;">Klik indikator di bawah, App akan tertutup dan Bot akan mengirimkan penjelasan super lengkap beserta analoginya di obrolan chat.</p>
            
            <h4 style="color: #ef5350;">🔴 High Impact (Dampak Besar)</h4>
            <div class="edu-grid">
                <button class="edu-btn bg-red" onclick="reqEdu('NFP (Non-Farm Payroll)')">NFP (Tenaga Kerja)</button>
                <button class="edu-btn bg-red" onclick="reqEdu('CPI (Consumer Price Index)')">CPI (Inflasi Konsumen)</button>
                <button class="edu-btn bg-red" onclick="reqEdu('FOMC / Suku Bunga Fed')">FOMC (Suku Bunga)</button>
                <button class="edu-btn bg-red" onclick="reqEdu('GDP (Gross Domestic Product)')">GDP (Pertumbuhan Ekonomi)</button>
                <button class="edu-btn bg-red" onclick="reqEdu('PPI (Producer Price Index)')">PPI (Inflasi Produsen)</button>
                <button class="edu-btn bg-red" onclick="reqEdu('Unemployment Rate')">Tingkat Pengangguran</button>
            </div>
            
            <h4 style="margin-top:15px; color: #ffb300;">🟡 Medium Impact (Dampak Sedang)</h4>
            <div class="edu-grid">
                <button class="edu-btn bg-orange" onclick="reqEdu('Retail Sales')">Retail Sales</button>
                <button class="edu-btn bg-orange" onclick="reqEdu('Core PCE Price Index')">Core PCE (Inflasi Fed)</button>
                <button class="edu-btn bg-orange" onclick="reqEdu('PMI (Purchasing Managers Index)')">PMI Manufaktur/Jasa</button>
                <button class="edu-btn bg-orange" onclick="reqEdu('Building Permits & Housing')">Data Perumahan</button>
            </div>
            
            <h4 style="margin-top:15px; color: #66bb6a;">🟢 Low Impact & Materi Dasar</h4>
            <div class="edu-grid">
                <button class="edu-btn bg-green" onclick="reqEdu('Initial Jobless Claims')">Klaim Pengangguran</button>
                <button class="edu-btn bg-green" onclick="reqEdu('Crude Oil Inventories')">Stok Minyak Mentah</button>
                <button class="edu-btn bg-blue" onclick="reqEdu('Smart Money Concept (SMC)')">Materi SMC</button>
                <button class="edu-btn bg-blue" onclick="reqEdu('Supply and Demand (SnD)')">Materi Supply/Demand</button>
            </div>
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        
        let ws;
        let currentPrice = 0;
        
        // VARIABEL STATE (Akan disimpan ke Memori HP)
        let currentPosition = ''; 
        let entryPrice = 0;
        let activeLot = 0;
        let savedPair = '';

        function showTab(t, elem) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            elem.classList.add('active');
        }

        // SISTEM ANTI-HILANG (SAVE/LOAD LOKAL)
        function saveState() {
            let state = { pos: currentPosition, price: entryPrice, lot: activeLot, pair: document.getElementById("pair").value };
            localStorage.setItem('tradeData', JSON.stringify(state));
        }

        function loadState() {
            let data = localStorage.getItem('tradeData');
            if (data) {
                let state = JSON.parse(data);
                if (state.pos !== '') {
                    currentPosition = state.pos;
                    entryPrice = state.price;
                    activeLot = state.lot;
                    document.getElementById("pair").value = state.pair; // Kembalikan ke pair yang ditrade
                    document.getElementById('status-text').innerText = `POSISI AKTIF: ${currentPosition} @ ${entryPrice}`;
                    document.getElementById('status-text').style.color = '#089981';
                }
            }
        }

        // KONEKSI DATA REALTIME
        function connectWS(symbol) {
            if(ws) ws.close();
            let wsSymbol = symbol.toLowerCase();
            ws = new WebSocket(`wss://stream.binance.com:9443/ws/${wsSymbol}@trade`);
            
            ws.onmessage = (event) => {
                let data = JSON.parse(event.data);
                currentPrice = parseFloat(data.p);
                document.getElementById('live-price').innerText = currentPrice.toFixed(2);
                calculatePnL();
            };
        }

        function calculatePnL() {
            let pnlDisplay = document.getElementById('pnl-display');
            if(currentPosition === '') {
                pnlDisplay.innerText = `Floating: $0.00`;
                pnlDisplay.className = 'pnl-box';
                return;
            }
            
            let diff = (currentPosition === 'BUY') ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
            let multiplier = document.getElementById("pair").value === 'BTCUSDT' ? 1 : 100;
            let pnl = diff * activeLot * multiplier;
            
            pnlDisplay.innerText = `Floating: $${pnl.toFixed(2)}`;
            pnlDisplay.className = pnl >= 0 ? 'pnl-box pnl-green' : 'pnl-box pnl-red';
        }

        function changePair() {
            let pair = document.getElementById("pair").value;
            connectWS(pair);
            document.getElementById("tv-chart").innerHTML = "";
            new TradingView.widget({ "container_id": "tv-chart", "symbol": "BINANCE:" + pair, "theme": "dark", "autosize": true, "interval": "15" });
        }

        function execTrade(type) {
            if(currentPosition !== '') { Telegram.WebApp.showAlert("Masih ada posisi aktif! Tutup dulu."); return; }
            if(currentPrice === 0) { Telegram.WebApp.showAlert("Menunggu harga..."); return; }
            
            currentPosition = type;
            entryPrice = currentPrice;
            activeLot = parseFloat(document.getElementById("lot").value) || 0.01;
            
            document.getElementById('status-text').innerText = `POSISI AKTIF: ${type} @ ${entryPrice}`;
            document.getElementById('status-text').style.color = '#089981';
            
            saveState(); // SIMPAN KE MEMORI HP
            Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
        }

        function execClose() {
            if(currentPosition === '') { Telegram.WebApp.showAlert("Tidak ada posisi aktif."); return; }
            
            let diff = (currentPosition === 'BUY') ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
            let multiplier = document.getElementById("pair").value === 'BTCUSDT' ? 1 : 100;
            let finalPnL = diff * activeLot * multiplier;
            
            let data = { action: 'CLOSE_TRADE', pair: document.getElementById("pair").value, type: currentPosition, pnl: finalPnL.toFixed(2) };
            
            // RESET & HAPUS DARI MEMORI HP
            currentPosition = '';
            localStorage.removeItem('tradeData');
            document.getElementById('status-text').innerText = `Menunggu Market...`;
            document.getElementById('status-text').style.color = '#aaa';
            
            Telegram.WebApp.sendData(JSON.stringify(data));
        }

        function askNews() {
            let t = document.getElementById("newsTopic").value;
            if(!t) { Telegram.WebApp.showAlert("Isi topik beritanya!"); return; }
            Telegram.WebApp.sendData(JSON.stringify({ action: 'NEWS_ANALYSIS', topic: t }));
        }

        function reqEdu(materi) {
            Telegram.WebApp.sendData(JSON.stringify({ action: 'EDUKASI', materi: materi }));
        }

        // INIT
        loadState(); // Panggil memori saat aplikasi baru dibuka
        changePair();
    </script>
</body>
</html>
