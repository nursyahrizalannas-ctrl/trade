<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0e1621; color: white; margin: 0; padding: 10px; }
        .chart-container { height: 300px; width: 100%; margin-bottom: 20px; }
        .news-box { background: #17212b; padding: 15px; border-radius: 10px; }
        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #242f3d; color: white; border: none; }
        .news-content { font-size: 14px; color: #b1bad3; line-height: 1.5; }
    </style>
</head>
<body>
    <h3>📊 XAUUSD Chart</h3>
    <div class="chart-container" id="tradingview-chart"></div>

    <div class="news-box">
        <h3>📰 News & Analysis</h3>
        <select id="newsOption" onchange="updateNews()">
            <option value="NFP">Audit NFP</option>
            <option value="CPI">Audit CPI</option>
            <option value="FOMC">Audit FOMC</option>
        </select>
        <div id="newsDisplay" class="news-content">Silakan pilih indikator di atas untuk melihat berita terbaru.</div>
    </div>

    <script>
        Telegram.WebApp.ready();

        // 1. Inisialisasi Chart TradingView
        new TradingView.widget({
            "container_id": "tradingview-chart",
            "symbol": "OANDA:XAUUSD",
            "theme": "dark",
            "autosize": true,
            "interval": "15",
            "timezone": "Etc/UTC"
        });

        // 2. Fungsi Update News Dinamis
        function updateNews() {
            let option = document.getElementById("newsOption").value;
            let display = document.getElementById("newsDisplay");
            
            if(option === "NFP") {
                display.innerHTML = "<b>NFP (Non-Farm Payrolls):</b> Data ketenagakerjaan AS. Jika data aktual > forecast, XAUUSD cenderung turun (USD menguat).";
            } else if(option === "CPI") {
                display.innerHTML = "<b>CPI (Consumer Price Index):</b> Data inflasi. Inflasi tinggi = suku bunga naik = XAUUSD cenderung turun.";
            } else if(option === "FOMC") {
                display.innerHTML = "<b>FOMC:</b> Pernyataan suku bunga The Fed. Sangat volatil, perhatikan arah kebijakan moneter.";
            }
        }
    </script>
</body>
</html>
